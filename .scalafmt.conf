# Pinned: 3.10.7 splits over-maxColumn infix chains like `it should "long title" in:` into a
# multiline colon-block that scalameta cannot re-parse — scalafix fails with ParseError and
# scalafmt itself cannot reformat its own output. Re-try the bump once fixed upstream.
version = "3.10.3"

runner.dialect = scala3
maxColumn = 110
align.preset = most

newlines.source = keep
newlines.afterCurlyLambdaParams = never
# newlines.afterImplicitKWInVerticalMultiline = true

rewrite.rules = [RedundantBraces, RedundantParens, SortModifiers]
rewrite.scala3.convertToNewSyntax = true
project.excludeFilters = [".*target/.*", "project/.*", "node_modules/.*"]