# Caution: scalafmt 3.10.4+ splits over-maxColumn infix chains like `it should "long title" in:`
# into a multiline colon-block that scalafix's scalameta cannot parse (ParseError). Keep test
# titles short enough that `  it should "..." in:` fits within maxColumn.
version = "3.11.1"

runner.dialect = scala3
maxColumn = 110
align.preset = most

newlines.source = keep
newlines.afterCurlyLambdaParams = never
# newlines.afterImplicitKWInVerticalMultiline = true

rewrite.rules = [RedundantBraces, RedundantParens, SortModifiers]
rewrite.scala3.convertToNewSyntax = true
project.excludeFilters = [".*target/.*", "project/.*", "node_modules/.*"]