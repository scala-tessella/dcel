        <g dominant-baseline="middle" text-anchor="middle" fill="green" font-size="6">
            <text x="56.25" y="-56.25">F1</text>
            <text x="25" y="-25">F2</text>
        </g>
        <!-- Inner Angle Labels -->
        <g dominant-baseline="middle" text-anchor="middle" fill="purple" font-size="5">
