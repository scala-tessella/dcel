            <text x="51.131371" y="-92.080404">180°</text>
            <text x="6.314818" y="-95.088475">90°</text>
            <text x="5.656854" y="-5.656854">90°</text>
            <text x="44.343146" y="-5.656854">90°</text>
            <text x="44.343146" y="-44.343146">90°</text>
            <text x="5.656854" y="-44.343146">90°</text>
        </g>
        <!-- Outer Angle Labels -->
        <g dominant-baseline="middle" text-anchor="middle" fill="orange" font-size="5">
            <text x="-5.656854" y="5.656854">270°</text>
            <text x="-7.95107" y="-49.116548">180°</text>
            <text x="-6.314818" y="-104.911525">270°</text>
            <text x="48.868629" y="-107.919596">180°</text>
