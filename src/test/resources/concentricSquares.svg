            <circle cx="50" cy="0" r="2.0"/>
            <circle cx="100" cy="0" r="2.0"/>
            <circle cx="100" cy="-50" r="2.0"/>
            <circle cx="100" cy="-100" r="2.0"/>
            <circle cx="50" cy="-100" r="2.0"/>
            <circle cx="0" cy="-100" r="2.0"/>
            <circle cx="-0" cy="-50" r="2.0"/>
            <circle cx="50" cy="-50" r="2.0"/>
        </g>
        <!-- Vertex Labels -->
        <g fill="darkblue" font-size="8">
