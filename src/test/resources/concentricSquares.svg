<svg width="140" height="140" viewBox="-20 -120 140 140" xmlns="http://www.w3.org/2000/svg">
    <g>
        <!-- Edges -->
        <g stroke-width="1.0" stroke="black">
            <line x1="0" y1="0" x2="50" y2="0"/>
            <line x1="50" y1="0" x2="100" y2="0"/>
            <line x1="100" y1="0" x2="100" y2="-50"/>
            <line x1="100" y1="-50" x2="100" y2="-100"/>
            <line x1="100" y1="-100" x2="50" y2="-100"/>
            <line x1="50" y1="-100" x2="0" y2="-100"/>
            <line x1="0" y1="-100" x2="-0" y2="-50"/>
            <line x1="-0" y1="-50" x2="0" y2="0"/>
            <line x1="-0" y1="-50" x2="50" y2="-50"/>
            <line x1="50" y1="-50" x2="50" y2="0"/>
        </g>
        <!-- Boundary Highlight -->
        <g fill="none" stroke-width="3.0" stroke="red">
            <polygon points="0,0 -0,-50 0,-100 50,-100 100,-100 100,-50 100,0 50,0"/>
        </g>
        <!-- Inner Face Half-Edge Direction Arrows -->
        <g stroke-width="0.5" stroke="blue" fill="blue">
            <polygon points="28,-50 25,-51.2 25,-48.8"/>
            <polygon points="50,-22 51.2,-25 48.8,-25"/>
            <polygon points="78,0 75,-1.2 75,1.2"/>
            <polygon points="100,-28 98.8,-25 101.2,-25"/>
            <polygon points="100,-78 98.8,-75 101.2,-75"/>
            <polygon points="72,-100 75,-98.8 75,-101.2"/>
            <polygon points="22,-100 25,-98.8 25,-101.2"/>
            <polygon points="0,-72 1.2,-75 -1.2,-75"/>
            <polygon points="28,0 25,-1.2 25,1.2"/>
            <polygon points="50,-28 48.8,-25 51.2,-25"/>
            <polygon points="22,-50 25,-48.8 25,-51.2"/>
            <polygon points="-0,-22 1.2,-25 -1.2,-25"/>
        </g>
        <!-- Outer Face Half-Edge Direction Arrows -->
        <g stroke-width="0.5" stroke="black" fill="black">
            <polygon points="-0,-28 -1.2,-25 1.2,-25"/>
            <polygon points="0,-78 -1.2,-75 1.2,-75"/>
            <polygon points="28,-100 25,-101.2 25,-98.8"/>
            <polygon points="78,-100 75,-101.2 75,-98.8"/>
            <polygon points="100,-72 101.2,-75 98.8,-75"/>
