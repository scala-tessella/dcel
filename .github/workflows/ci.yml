name: CI
on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
          cache: sbt
      - name: Setup sbt
        uses: sbt/setup-sbt@v1
      - name: Build and Test Scala JVM
        run: sbt dcelJVM/test
      - name: Build and Test Scala JS
        run: sbt dcelJS/test
      - name: Scalafmt check
        run: sbt scalafmtCheckAll
      - name: Scalafix check
        run: sbt "scalafixAll --check"
